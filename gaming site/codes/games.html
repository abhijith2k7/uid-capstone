<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CyberX Gaming</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Orbitron', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
}

/* Background Wallpaper */
.hero {
    height: 100vh;
    width: 100%;
    background:
        linear-gradient(
            rgba(0, 0, 0, 0.65),
            rgba(0, 0, 0, 0.85)
        ),
        url("cyberpunk.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display: flex;
    flex-direction: column;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
    background: rgba(0, 0, 0, 0.5);
    border-bottom: 1px solid #00f7ff40;
}

.logo {
    font-size: 28px;
    color: #00f7ff;
    text-shadow: 0 0 15px #00f7ff;
}

.navbar a {
    color: #ffffff;
    text-decoration: none;
    margin-left: 25px;
    transition: 0.3s;
}

.navbar a:hover {
    color: #00f7ff;
    text-shadow: 0 0 10px #00f7ff;
}

/* Center Content */
.content {
    flex: 1;
    display: flex;
    align-items: center;
    padding-left: 70px;
}

.content-box {
    max-width: 520px;
    padding: 35px;
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid #00f7ff60;
    box-shadow: 0 0 30px #00f7ff50;
}

.content-box h1 {
    font-size: 44px;
    color: #00f7ff;
    margin-bottom: 15px;
    text-shadow: 0 0 15px #00f7ff;
}

.content-box p {
    font-size: 18px;
    line-height: 1.6;
    color: #cccccc;
}

/* Button */
.content-box button {
    margin-top: 25px;
    padding: 14px 35px;
    background: transparent;
    border: 2px solid #00f7ff;
    color: #00f7ff;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 20px #00f7ff60;
}

.content-box button:hover {
    background: #00f7ff;
    color: #000;
    box-shadow: 0 0 40px #00f7ff;
}

/* Footer */
footer {
    text-align: center;
    padding: 15px;
    background: rgba(0, 0, 0, 0.6);
    color: #888;
    border-top: 1px solid #00f7ff30;
}

/* Mobile Responsive */
@media (max-width: 768px) {
    .content {
        padding-left: 20px;
        padding-right: 20px;
    }

    .content-box h1 {
        font-size: 30px;
    }
}
</style>
</head>

<body>

<div class="hero">

    <!-- Navbar -->
    <div class="navbar">
        <div class="logo">CYBERX</div>
        <div>
            <a href="#">Home</a>
            <a href="#">Games</a>
            <a href="#">Store</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="content">
        <div class="content-box">
            <h1>WELCOME TO NIGHT CITY</h1>
            <p>
                Step into a neon-lit future. Play elite cyber games,
                dominate the streets, and become a legend.
            </p>
            <button>START PLAYING</button>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        © 2026 CYBERX GAMING | All Rights Reserved
    </footer>

</div>

</body>
</html>
