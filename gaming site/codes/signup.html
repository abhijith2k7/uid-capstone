<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AK Games - Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: sans-serif;
      min-height: 100vh;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: #000;
      border-bottom: 1px solid #0ff;
    }

    .left-nav {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #00eaff;
      text-shadow: 0 0 10px #00eaff;
    }

    .search-box input {
      background: transparent;
      border: 2px solid #00eaff;
      color: #fff;
      padding: 8px 16px;
      border-radius: 25px;
      outline: none;
      width: 180px;
      box-shadow: 0 0 10px rgba(0,234,255,0.6);
      transition: width 0.3s ease, box-shadow 0.3s ease;
    }

    .search-box input::placeholder { color: #aaa; }
    .search-box input:focus {
      width: 240px;
      box-shadow: 0 0 20px rgba(0,234,255,1);
    }

    .right-nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .right-nav a {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: 14px;
      color: #aaa;
      text-decoration: none;
      transition: color 0.3s;
      font-size: 15px;
    }

    .right-nav a:hover { color: #00eaff; }

    .right-nav a .material-symbols-outlined {
      font-size: 22px;
      line-height: 1;
    }

    .nav-label { display: inline; }

    /* ===== SIGNUP PAGE ===== */
    .signup-page {
      min-height: calc(100vh - 80px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 50px 20px;
    }

    .signup-box {
      width: 100%;
      max-width: 900px;
      background: rgba(8,8,8,0.95);
      border: 2px solid #00eaff;
      border-radius: 22px;
      padding: 35px;
      box-shadow:
        0 0 20px rgba(0,234,255,0.45),
        0 0 45px rgba(0,234,255,0.2);
    }

    .signup-box h2 {
      text-align: center;
      font-size: 32px;
      color: #00eaff;
      text-shadow: 0 0 10px #00eaff, 0 0 20px #00eaff;
      margin-bottom: 10px;
    }

    .signup-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-top: 25px;
    }

    .signup-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
    }

    .signup-row.single {
      grid-template-columns: 1fr;
    }

    .signup-form input,
    .signup-form select {
      width: 100%;
      padding: 14px 16px;
      background: #0b0b0b;
      border: 2px solid #00eaff;
      border-radius: 14px;
      outline: none;
      color: #fff;
      font-size: 16px;
      box-shadow: 0 0 10px rgba(0,234,255,0.18);
    }

    .signup-form select option { background: #0b0b0b; }

    .signup-form input::placeholder { color: #aaa; }

    .signup-form input:focus,
    .signup-form select:focus {
      box-shadow:
        0 0 14px rgba(0,234,255,0.5),
        0 0 28px rgba(0,234,255,0.18);
    }

    .error-msg {
      color: #ff0033;
      font-size: 14px;
      text-shadow: 0 0 8px #ff0033;
      display: none;
      text-align: center;
    }

    .success-msg {
      color: #00eaff;
      font-size: 15px;
      text-shadow: 0 0 8px #00eaff;
      display: none;
      text-align: center;
    }

    .btn {
      padding: 12px 28px;
      border: 2px solid #00eaff;
      color: #00eaff;
      text-decoration: none;
      border-radius: 30px;
      box-shadow: 0 0 10px #00eaff;
      transition: all 0.3s ease;
      cursor: pointer;
      background: transparent;
      font-size: 15px;
      font-weight: bold;
      width: 100%;
      margin-top: 10px;
    }

    .btn:hover {
      background: #00eaff;
      color: #000;
      box-shadow: 0 0 25px #00eaff;
    }

    .btn.primary {
      border-color: #ff0033;
      color: #ff0033;
      box-shadow: 0 0 12px #ff0033;
    }

    .btn.primary:hover {
      background: #ff0033;
      color: #fff;
      box-shadow: 0 0 30px #ff0033;
    }

    .signup-text {
      text-align: center;
      color: #ddd;
      margin-top: 18px;
      font-size: 17px;
    }

    .signup-text a { color: #00eaff; text-decoration: none; }
    .signup-text a:hover { text-shadow: 0 0 10px #00eaff; }

    .more-btn {
      display: block;
      width: fit-content;
      margin: 20px auto 0;
      padding: 14px 38px;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 1px;
      text-decoration: none;
      color: #00eaff;
      border: 2px solid #00eaff;
      border-radius: 40px;
      background: rgba(0,234,255,0.08);
      box-shadow:
        0 0 10px rgba(0,234,255,0.6),
        0 0 25px rgba(0,234,255,0.8),
        inset 0 0 15px rgba(0,234,255,0.4);
      transition: 0.3s ease;
    }

    .more-btn:hover {
      color: #000;
      background: #00eaff;
      box-shadow: 0 0 20px #00eaff, 0 0 50px #00eaff;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      .navbar { padding: 16px 20px; }
      .search-box { display: none; }
      .nav-label { display: none; }
      .right-nav a { margin-left: 10px; }
      .right-nav a .material-symbols-outlined { font-size: 26px; }
      .signup-box { padding: 22px 16px; }
      .signup-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <header class="navbar">
    <div class="left-nav">
      <h1 class="logo">AK</h1>
      <div class="search-box">
        <input type="text" placeholder="Search games...">
      </div>
    </div>

    <nav class="right-nav">
      <a href="login.html" id="nav-login-link">
        <span class="material-symbols-outlined" id="nav-auth-icon">login</span>
        <span class="nav-label" id="nav-auth-label">Login</span>
      </a>
      <a href="favourites.html">
        <span class="material-symbols-outlined">star_shine</span>
        <span class="nav-label">Favourites</span>
      </a>
      <a href="downloads.html">
        <span class="material-symbols-outlined">download_2</span>
        <span class="nav-label">Downloads</span>
      </a>
      <a href="support.html">
        <span class="material-symbols-outlined">support</span>
        <span class="nav-label">Support</span>
      </a>
    </nav>
  </header>

  <!-- ===== SIGNUP SECTION ===== -->
  <section class="signup-page">
    <div class="signup-box">
      <h2>Create Account</h2>

      <div class="signup-form">
        <div class="signup-row">
          <input type="text"  id="first-name"  placeholder="First Name"  required>
          <input type="text"  id="last-name"   placeholder="Last Name"   required>
        </div>

        <div class="signup-row">
          <input type="email" id="signup-email" placeholder="Email Address" required>
          <input type="tel"   id="phone"        placeholder="Phone Number"  required>
        </div>

        <div class="signup-row">
          <input type="password" id="signup-password" placeholder="Create Password" required>
          <input type="password" id="confirm-password" placeholder="Confirm Password" required>
        </div>

        <div class="signup-row single">
          <select id="country" required>
            <option value="">Select Country</option>
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
            <option>Canada</option>
            <option>Australia</option>
          </select>
        </div>

        <p class="error-msg"   id="signup-error"></p>
        <p class="success-msg" id="signup-success">Account created! Redirecting to login...</p>

        <button class="btn primary" onclick="handleSignup()">Create Account</button>
      </div>

      <p class="signup-text">
        Already have an account?
        <a href="login.html">Login</a>
      </p>

      <a href="index.html" class="more-btn">← Back to Home</a>
    </div>
  </section>

  <script>
    // ===== AUTH STATE: update navbar =====
    function updateNavAuth() {
      const user  = JSON.parse(localStorage.getItem('ak_user'));
      const icon  = document.getElementById('nav-auth-icon');
      const label = document.getElementById('nav-auth-label');
      const link  = document.getElementById('nav-login-link');

      if (user) {
        icon.textContent  = 'account_box';
        label.textContent = 'Account';
        link.href         = 'account.html';
      } else {
        icon.textContent  = 'login';
        label.textContent = 'Login';
        link.href         = 'login.html';
      }
    }

    // ===== HANDLE SIGNUP =====
    function handleSignup() {
      const firstName = document.getElementById('first-name').value.trim();
      const lastName  = document.getElementById('last-name').value.trim();
      const email     = document.getElementById('signup-email').value.trim();
      const phone     = document.getElementById('phone').value.trim();
      const password  = document.getElementById('signup-password').value;
      const confirm   = document.getElementById('confirm-password').value;
      const country   = document.getElementById('country').value;
      const errorEl   = document.getElementById('signup-error');
      const successEl = document.getElementById('signup-success');

      errorEl.style.display   = 'none';
      successEl.style.display = 'none';

      // Validation
      if (!firstName || !lastName || !email || !phone || !password || !confirm || !country) {
        errorEl.textContent   = 'Please fill in all fields.';
        errorEl.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorEl.textContent   = 'Password must be at least 6 characters.';
        errorEl.style.display = 'block';
        return;
      }

      if (password !== confirm) {
        errorEl.textContent   = 'Passwords do not match.';
        errorEl.style.display = 'block';
        return;
      }

      // Check duplicate email
      const users = JSON.parse(localStorage.getItem('ak_users') || '[]');
      const exists = users.find(u => u.email === email);

      if (exists) {
        errorEl.textContent   = 'An account with this email already exists.';
        errorEl.style.display = 'block';
        return;
      }

      // Save new user
      const newUser = { firstName, lastName, email, phone, password, country };
      users.push(newUser);
      localStorage.setItem('ak_users', JSON.stringify(users));

      // Show success and redirect
      successEl.style.display = 'block';
      setTimeout(() => { window.location.href = 'login.html'; }, 1800);
    }

    // Allow Enter key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleSignup();
    });

    updateNavAuth();
  </script>

</body>
</html>
