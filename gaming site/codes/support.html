<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Center</title>
  <link rel="stylesheet" href="index.css">
</head>
<body class="form-page">

  <section class="support-page">
    <h2 class="neon center">Support Center</h2>

    <div class="support-box">
      <div class="support-info">
        <h3>Contact Us</h3>
        <p>Email: support@akgames.com</p>
        <p>Phone: +91 9876543210</p>
      </div>

      <div class="support-info">
        <h3>Report Issue</h3>

        <form class="support-form">
          <input type="text" placeholder="Your Name" required>
          <input type="email" placeholder="Your Email" required>

          <select required>
            <option value="">Select Issue Type</option>
            <option>Game Not Working</option>
            <option>Payment Issue</option>
            <option>Account Problem</option>
            <option>Download Error</option>
            <option>Other</option>
          </select>

          <textarea placeholder="Describe your issue..." required></textarea>

          <button type="submit" class="btn primary">Submit</button>
        </form>
      </div>
    </div>

    <a href="index.html" class="more-btn">← Back to Home</a>
  </section>

</body>
</html>
